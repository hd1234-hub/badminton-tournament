# 开发环境：PostgreSQL + 后端 + 前端（一键启动）
# 使用: docker-compose -f docker-compose.dev.yml up -d

version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: badminton-postgres
    environment:
      POSTGRES_USER: badminton
      POSTGRES_PASSWORD: badminton123
      POSTGRES_DB: badminton
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # 暴露端口给DBeaver连接
    restart: unless-stopped

  # 可选：Web版数据库管理工具（不用DBeaver也能查看）
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: badminton-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"  # 访问 http://localhost:5050 查看数据库
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_dev_data:
