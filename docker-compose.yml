# Docker Compose 部署配置
# 使用: docker-compose up -d

version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    container_name: badminton-db
    environment:
      POSTGRES_USER: badminton
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: badminton
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badminton"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: badminton-api
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      RUN_AUTO_MIGRATE: ${RUN_AUTO_MIGRATE:-false}
      DATABASE_URL: postgresql://badminton:${DB_PASSWORD:-change_me_in_production}@db:5432/badminton
      SECRET_KEY: ${SECRET_KEY:-generate_random_key}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      MAX_REQUESTS_PER_MINUTE: ${MAX_REQUESTS_PER_MINUTE:-100}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # 前端（Nginx静态文件）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: badminton-web
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
